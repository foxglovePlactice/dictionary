<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<title>新規登録</title>
</head>
<body>
	<!--アクション : 登録-->
	<form th:action="@{/words/save}" method="post">
		<input type="hidden" th:field="${wordForm.wordId}">
		<h5>タaaaグ</h5>
		<label th:each="tag : ${allTags}">
			<input type="checkbox" name="tag" th:value="${tag.tagId}" th:text="${tag.tagName}" th:field="${wordForm.haveTag}">
		</label>
		<table>
			<tr>
				<th>見出し語</th>
				<td>
					<input type="text" th:field="${wordForm.word}">
				</td>
			</tr>
			<tr>
				<th>読み</th>
				<td>
					<input type="text" th:field="${wordForm.pronounce}">
				</td>
			</tr>
			<tr>
				<th>詳細</th>
				<td>
					<textarea rows="5" cols="30" th:field="${contentForm.content}"></textarea>
				</td>
			</tr>
		</table>
		<!--ボタン : 登録-->
		<input type="submit" value="登録">
	</form>
	<a th:href="@{/words}">戻る</a>

</body>
</html>
