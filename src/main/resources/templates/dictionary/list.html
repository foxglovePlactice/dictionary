<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<title>辞書ページ</title>
</head>
<body>
	<h2>辞書</h2>
	<!-- フラッシュメッセージの表示 -->
	<p th:if="${message}" th:text="${message}">完了メッセージ</p>
	<p th:if="${errorMessage}" th:text="${errorMessage}" style="color: red;">エラーメッセージ</p>
	
	<table border="1" width="300">
		<thead>
			<tr>
				<th>ID</th>
				<th>見出し語</th>
				<th>詳細</th>
			</tr>
		</thead>
		<tbody>
			<tr th:each="word : ${words}">
				<td th:text="${word.wordId}"></td>
				<td th:text="${word.word}"></td>
				<td>
					<a th:href="@{/words/{id}(id=${word.wordId})}">詳細</a>
				</td>
			</tr>
		</tbody>
	</table>

</body>
</html>
