<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<title th:text="リスト_管理者">Insert title here</title>
</head>
<body>
	<h2 th:text="${辞書}"></h2>
	<!--フラッシュメッセージ-->
	<p th:if="${message}" th:text="${message}">完了メッセージ</p>
	<p th:if="${errorMessage}" th:text="${errorMessage}" style="color: red;">エラーメッセージ</p>
	
	<a th:href="@{/wordsAdmin/tag}">タグ編集</a>
	
	<table border="1" width="300">
		<thead>
			<tr>
				<th>ID</th>
				<th>見出し語</th>
				<th>詳細</th>
			</tr>
		</thead>
		<tbody>
			<tr th:each="word : ${words}">
				<td th:text="${word.wordId}"></td>
				<td th:text="${word.word}"></td>
				<td>
					<a th:href="@{/wordsAdmin/{id}(id=${word.wordId})}">詳細</a>
				</td>
			</tr>
		</tbody>
	</table>
	
	<a th:href="@{/wordsAdmin/form}">見出し語追加</a>

</body>
</html>
